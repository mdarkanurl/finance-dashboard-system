version: "3.9"

services:
  app:
    build:
      context: .
    container_name: app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/mydb
      PORT: 3000
      JWT_SECRET_FOR_ACCESS_TOKEN: cfecd18da3b10a02b43f4bd190fee51392bd88b73cc263f4b8ba9cf48c9ec0a4c00d0e
      JWT_SECRET_FOR_REFRESH_TOKEN: 46d877a2155405a286b8ad7f069b166d86cfbe887b19737c23bb5fdd733e5ae4dabbe9
      REDIS_URL: redis://redis:6379
    command: npm run start
    depends_on:
      postgres:
        condition: service_healthy
      prisma:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  prisma:
    build:
      context: .
    container_name: prisma_migrate
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/mydb
    command: npx prisma db push
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
